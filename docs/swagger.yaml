basePath: /api
definitions:
  controllers.CreateProblemRequest:
    properties:
      difficulty:
        type: string
      memoryLimitKb:
        type: integer
      problemMd:
        type: string
      slug:
        type: string
      testcases:
        items:
          $ref: '#/definitions/controllers.TestcaseRequest'
        type: array
      timeLimitMs:
        type: integer
      title:
        type: string
    required:
    - slug
    - testcases
    - title
    type: object
  controllers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  controllers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  controllers.LoginResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  controllers.MeResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      fullName:
        type: string
      id:
        type: integer
      updatedAt:
        type: string
      username:
        type: string
    type: object
  controllers.ProblemDetailResponse:
    properties:
      acceptanceRate:
        type: number
      difficulty:
        type: string
      id:
        type: integer
      isPublished:
        type: boolean
      memoryLimitKb:
        type: integer
      problemMd:
        type: string
      slug:
        type: string
      timeLimitMs:
        type: integer
      title:
        type: string
    type: object
  controllers.ProblemListResponse:
    properties:
      difficulty:
        type: string
      id:
        type: integer
      slug:
        type: string
      title:
        type: string
    type: object
  controllers.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    type: object
  controllers.RefreshTokenResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  controllers.RunRequest:
    properties:
      code:
        type: string
      language:
        type: string
      problemId:
        description: optional if just running bare code, but good for saving
        type: integer
      stdin:
        type: string
    required:
    - code
    - language
    type: object
  controllers.SubmitRequest:
    properties:
      code:
        type: string
      language:
        type: string
      problemId:
        type: integer
    type: object
  controllers.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  controllers.TestcaseRequest:
    properties:
      expectedOutput:
        type: string
      inputData:
        type: string
      isHidden:
        type: boolean
    required:
    - expectedOutput
    - inputData
    type: object
host: code.innogenlab.com
info:
  contact: {}
  description: API for competitive programming platform
  title: Innogen Backend API
  version: "1.0"
paths:
  /admin/problems:
    post:
      consumes:
      - application/json
      description: Create a new problem with test cases (admin/teacher only)
      parameters:
      - description: Problem details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateProblemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controllers.ProblemDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new problem
      tags:
      - problems
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login credentials
        in: body
        name: LoginRequest
        required: true
        schema:
          $ref: '#/definitions/controllers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke the refresh token and logout the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/logout-all:
    post:
      consumes:
      - application/json
      description: Revoke all refresh tokens for the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout from all devices
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a valid refresh token
      parameters:
      - description: Refresh token
        in: body
        name: RefreshTokenRequest
        required: true
        schema:
          $ref: '#/definitions/controllers.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.RefreshTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /me:
    get:
      consumes:
      - application/json
      description: Get information about the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - me
  /problems:
    get:
      consumes:
      - application/json
      description: Retrieve list of all problems
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/controllers.ProblemListResponse'
            type: array
      summary: Get all problems
      tags:
      - problems
  /problems/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a specific problem by its ID
      parameters:
      - description: Problem ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.ProblemDetailResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      summary: Get problem by ID
      tags:
      - problems
  /run:
    post:
      consumes:
      - application/json
      description: Execute code without test cases and return the result
      parameters:
      - description: Code execution details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.RunRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Run code directly
      tags:
      - run
  /submit:
    post:
      consumes:
      - application/json
      description: Submit code for a problem to be judged against test cases
      parameters:
      - description: Submission details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.SubmitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit code for judging
      tags:
      - submissions
  /submit/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a specific submission by its ID
      parameters:
      - description: Submission ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controllers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get submission by ID
      tags:
      - submissions
schemes:
- https
- http
swagger: "2.0"
